<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="description" content="Calcola la media dei voti ClasseViva" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="che media ho?" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>che media ho?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c0c;
      --surface:   #161616;
      --surface2:  #1e1e1e;
      --border:    #2a2a2a;
      --text:      #e8e8e8;
      --muted:     #888;
      --accent:    #c84444;
      --accent-lo: rgba(200,68,68,.12);
      --green:     #4caf6e;
      --yellow:    #e0a943;
      --red:       #c84444;
      --blue:      #4a8fd4;
      --radius:    10px;
      --mono:      "DM Mono", monospace;
      --sans:      "DM Sans", sans-serif;
      --transition: 160ms ease;
    }
    [data-theme="light"] {
      --bg:        #f5f5f3;
      --surface:   #ffffff;
      --surface2:  #eeeeec;
      --border:    #dcdcda;
      --text:      #111;
      --muted:     #666;
      --accent-lo: rgba(200,68,68,.08);
    }

    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .hidden { display: none !important; }
    .mono   { font-family: var(--mono); }

    #app { min-height: 100dvh; display: flex; flex-direction: column; }

    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      height: 52px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .topbar-brand {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: .02em;
      user-select: none;
    }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
    }
    .icon-btn:hover { color: var(--text); border-color: var(--muted); }
    .icon-btn svg { width: 15px; height: 15px; }

    .view { display: none; flex: 1; }
    .view.active { display: flex; flex-direction: column; }

    #view-login {
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
    }
    .login-logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .login-logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .login-logo-icon svg { width: 20px; height: 20px; color: #fff; }
    .login-title {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.2;
    }
    .login-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color var(--transition);
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); opacity: .6; }
    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity var(--transition);
    }
    .login-btn:hover:not(:disabled) { opacity: .88; }
    .login-btn:disabled { opacity: .45; cursor: default; }
    .login-error {
      font-size: 13px;
      color: var(--red);
      min-height: 18px;
      margin-top: 10px;
      text-align: center;
    }
    .login-note {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 18px;
      line-height: 1.5;
    }

    #view-grades { padding: 0 0 80px; }

    .summary-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 12px;
      gap: 12px;
    }
    .summary-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }
    .summary-avg {
      font-family: var(--mono);
      font-size: 32px;
      font-weight: 500;
      line-height: 1;
    }
    .summary-avg.excellent { color: var(--green); }
    .summary-avg.pass      { color: var(--yellow); }
    .summary-avg.fail      { color: var(--red); }

    .refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      padding: 6px 12px;
      font-family: var(--sans);
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: color var(--transition);
      flex-shrink: 0;
    }
    .refresh-btn:hover { color: var(--text); }
    .refresh-btn svg { width: 13px; height: 13px; }
    .refresh-btn.spinning svg { animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .period-block { padding: 0 12px 8px; }
    .period-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      padding: 12px 4px 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .period-avg {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
    }

    .subject-row {
      display: flex; align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
      gap: 10px;
    }
    .subject-row:hover { border-color: var(--muted); background: var(--surface2); }
    .subject-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .grade-chips { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; align-items: center; }
    .chip {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .chip:hover { opacity: .75; }
    .chip.excellent { background: rgba(76,175,110,.15); color: var(--green); }
    .chip.pass      { background: rgba(224,169,67,.13); color: var(--yellow); }
    .chip.fail      { background: rgba(200,68,68,.15);  color: var(--red); }
    .chip.blue      { background: rgba(74,143,212,.15); color: var(--blue); }
    .subject-avg {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      min-width: 30px;
      text-align: right;
    }

    #view-subject { padding: 0 0 80px; }

    .back-btn {
      display: flex; align-items: center; gap: 6px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 13px;
      cursor: pointer;
      padding: 14px 16px 4px;
      transition: color var(--transition);
    }
    .back-btn:hover { color: var(--text); }
    .back-btn svg { width: 15px; height: 15px; }

    .subject-header {
      padding: 8px 16px 16px;
      border-bottom: 1px solid var(--border);
    }
    .subject-header-name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .subject-stats {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .stat {
      display: flex; flex-direction: column;
    }
    .stat-value {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 500;
      line-height: 1;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .period-grades {
      padding: 14px 14px 0;
    }
    .grade-card {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color var(--transition);
    }
    .grade-card:hover { border-color: var(--muted); }
    .grade-big {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      min-width: 42px;
    }
    .grade-meta { flex: 1; }
    .grade-date { font-size: 12px; color: var(--muted); }
    .grade-component { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .grade-note { font-size: 12px; color: var(--muted); margin-top: 3px; font-style: italic; }

    .goal-section {
      margin: 16px 14px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .goal-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .goal-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .goal-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      padding: 7px 10px;
      width: 70px;
      outline: none;
      transition: border-color var(--transition);
    }
    .goal-input:focus { border-color: var(--accent); }
    .goal-btn {
      background: var(--accent-lo);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      padding: 7px 12px;
      cursor: pointer;
      transition: background var(--transition);
    }
    .goal-btn:hover { background: rgba(200,68,68,.2); }
    .goal-result {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
      min-height: 18px;
    }
    .goal-result strong { color: var(--text); font-family: var(--mono); }

    /* ── Modal ──────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.65);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 200ms ease;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 20px 20px 28px;
      transform: translateY(20px);
      transition: transform 200ms ease;
    }
    .modal-overlay.show .modal { transform: translateY(0); }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .modal-grade-big {
      font-family: var(--mono);
      font-size: 48px;
      font-weight: 500;
      line-height: 1;
      text-align: center;
      margin-bottom: 12px;
    }
    .modal-row {
      display: flex; justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .modal-row:last-child { border-bottom: none; }
    .modal-row-label { color: var(--muted); }
    .modal-close {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 10px;
      cursor: pointer;
      margin-top: 14px;
    }
    
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    .skeleton-row {
      height: 52px;
      margin-bottom: 6px;
      border-radius: var(--radius);
    }
    
    @media (min-width: 480px) {
      #view-login { padding: 48px 20px; }
      .modal { border-radius: 16px; margin-bottom: 20px; }
    }
  </style>
</head>

<script>
const PROXY_BASE   = "/api/proxy";
const AUTH_URL     = "/auth-p7/app/default/AuthApi4.php?a=aLoginPwd";
const BASE_API     = "/rest/w1";
const GRADES_YEAR  = 26; // grades26 endpoint, update yearly

let state = {
  cookies:   null,   // { PHPSESSID, webidentity, webrole }
  studentId: null,
  gradesAvr: null,
};

async function cvFetch(path, opts = {}) {
  const url = `${PROXY_BASE}?path=${encodeURIComponent(path)}`;
  const headers = { ...(opts.headers || {}) };
  if (state.cookies) {
    const cookieStr = Object.entries(state.cookies)
      .map(([k, v]) => `${k}=${v}`).join("; ");
    headers["Cookie"] = cookieStr;
  }
  const res = await fetch(url, { ...opts, headers });
  if (!res.ok && res.status !== 302) {
    const text = await res.text().catch(() => "");
    throw Object.assign(new Error(`HTTP ${res.status}`), { status: res.status, body: text });
  }
  return res;
}

async function cvJSON(path, opts = {}) {
  const res = await cvFetch(path, opts);
  return res.json();
}

async function login(uid, pwd) {
  const params = new URLSearchParams({ cid: "", uid, pwd, pin: "", target: "" });

  const res = await fetch(
    `${PROXY_BASE}?path=${encodeURIComponent(AUTH_URL)}`,
    {
      method:  "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body:    params.toString(),
    }
  );

  const raw = res.headers.get("set-cookie") || "";
  const cookies = parseCookies(raw);

  if (!cookies.PHPSESSID) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error || "credenziali non valide");
  }

  state.cookies = cookies;

  const whoami = await cvJSON(`${BASE_API}/misc/whoami`);
  state.studentId = whoami.id;

  sessionStorage.setItem("cv_session", JSON.stringify({ cookies, studentId: whoami.id }));

  return whoami;
}

function parseCookies(setCookieHeader) {
  const out = {};
  const parts = setCookieHeader.split(/,(?=\s*\w+=)/);
  for (const part of parts) {
    const seg = part.split(";")[0].trim();
    const eq  = seg.indexOf("=");
    if (eq > 0) {
      const key = seg.slice(0, eq).trim();
      const val = seg.slice(eq + 1).trim();
      if (["PHPSESSID", "webidentity", "webrole", "i18n_redirected"].includes(key)) {
        out[key] = val;
      }
    }
  }
  return out;
}

function loadSession() {
  try {
    const saved = sessionStorage.getItem("cv_session");
    if (!saved) return false;
    const { cookies, studentId } = JSON.parse(saved);
    if (!cookies?.PHPSESSID || !studentId) return false;
    state.cookies   = cookies;
    state.studentId = studentId;
    return true;
  } catch { return false; }
}

function clearSession() {
  state.cookies   = null;
  state.studentId = null;
  state.gradesAvr = null;
  sessionStorage.removeItem("cv_session");
}

async function fetchGrades() {
  const data = await cvJSON(`${BASE_API}/students/${state.studentId}/grades${GRADES_YEAR}`);
  return data.grades || [];
}

function calcAvr(gradesList) {
  const avr = {};

  for (const g of gradesList) {
    const dec = g.decimalValue;
    if (dec == null || g.noAverage) continue;

    let period = String(g.periodPos - 1);
    if (period < "1") period = "1";

    if (!avr[period]) avr[period] = {};
    if (!avr[period][g.subjectDesc]) {
      avr[period][g.subjectDesc] = { avr: 0, grades: [] };
    }

    avr[period][g.subjectDesc].grades.push({
      decimalValue:   dec,
      displayValue:   g.displayValue,
      evtDate:        g.evtDate,
      componentDesc:  g.componentDesc,
      notesForFamily: g.notesForFamily,
      teacherName:    g.teacherName,
      isBlue:         g.color === "blue",
    });
  }
  
  for (const period of Object.keys(avr)) {
    const periodAll = [];
    for (const subj of Object.keys(avr[period])) {
      const eff = effectiveGrades(avr[period][subj].grades);
      avr[period][subj].avr = eff.length ? eff.reduce((a, b) => a + b, 0) / eff.length : 0;
      periodAll.push(...eff);
    }
    avr[period]._periodAvr = periodAll.length
      ? periodAll.reduce((a, b) => a + b, 0) / periodAll.length : 0;
  }

  const all = [];
  for (const period of Object.keys(avr)) {
    for (const subj of Object.keys(avr[period])) {
      if (subj === "_periodAvr") continue;
      all.push(...effectiveGrades(avr[period][subj].grades));
    }
  }
  avr._allAvr = all.length ? all.reduce((a, b) => a + b, 0) / all.length : 0;

  return avr;
}

function effectiveGrades(gradesList) {
  const standalone = [];
  const groups     = {};
  for (const g of gradesList) {
    if (g.componentDesc) {
      (groups[g.evtDate] = groups[g.evtDate] || []).push(g.decimalValue);
    } else {
      standalone.push(g.decimalValue);
    }
  }
  return [
    ...standalone,
    ...Object.values(groups).map(arr => arr.reduce((a, b) => a + b, 0) / arr.length),
  ];
}

function gradeClass(v) {
  if (v >= 6.5) return "excellent";
  if (v >= 5.5) return "pass";
  return "fail";
}

function fmtAvr(v) {
  return typeof v === "number" ? v.toFixed(2) : "—";
}

function showView(id) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  const logoutBtn = document.getElementById("logoutBtn");
  logoutBtn.classList.toggle("hidden", id === "view-login");
}

function renderGrades(avr) {
  const container  = document.getElementById("gradesContainer");
  const overallEl  = document.getElementById("overallAvg");

  const overall = avr._allAvr || 0;
  overallEl.textContent = fmtAvr(overall);
  overallEl.className   = `summary-avg ${gradeClass(overall)}`;

  const periods = Object.keys(avr).filter(k => !k.startsWith("_")).sort();
  let html = "";

  for (const period of periods) {
    const subjects  = avr[period];
    const periodAvr = subjects._periodAvr || 0;

    html += `
      <div class="period-block">
        <div class="period-label">
          periodo ${period}
          <span class="period-avg ${gradeClass(periodAvr)}">${fmtAvr(periodAvr)}</span>
        </div>`;

    const subjNames = Object.keys(subjects).filter(k => !k.startsWith("_")).sort();
    for (const subj of subjNames) {
      const sd     = subjects[subj];
      const cls    = gradeClass(sd.avr);
      const chips  = sd.grades.map(g => {
        const gc = g.isBlue ? "blue" : gradeClass(g.decimalValue);
        return `<span class="chip ${gc}" data-grade='${escAttr(JSON.stringify(g))}'>${g.displayValue || g.decimalValue}</span>`;
      }).join("");

      html += `
        <div class="subject-row" data-subject="${escAttr(subj)}" data-period="${period}">
          <div class="subject-name">${escHtml(subj)}</div>
          <div class="grade-chips">${chips}</div>
          <div class="subject-avg ${cls}">${fmtAvr(sd.avr)}</div>
        </div>`;
    }
    html += `</div>`;
  }

  container.innerHTML = html;

  container.querySelectorAll(".subject-row").forEach(row => {
    row.addEventListener("click", e => {
      if (e.target.classList.contains("chip")) return;
      openSubject(row.dataset.subject);
    });
  });
  
  container.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", e => {
      e.stopPropagation();
      openGradeModal(JSON.parse(chip.dataset.grade));
    });
  });
}

function openSubject(subjName) {
  const avr = state.gradesAvr;
  const periods = Object.keys(avr).filter(k => !k.startsWith("_")).sort();

  let allGrades = [];
  for (const p of periods) {
    if (avr[p][subjName]) allGrades.push(...avr[p][subjName].grades);
  }

  const vals    = allGrades.map(g => g.decimalValue).filter(v => v != null);
  const subjAvr = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
  const highest = vals.length ? Math.max(...vals) : null;
  const lowest  = vals.length ? Math.min(...vals) : null;

  let html = `
    <div class="subject-header">
      <div class="subject-header-name">${escHtml(subjName)}</div>
      <div class="subject-stats">
        <div class="stat">
          <div class="stat-value ${gradeClass(subjAvr)}">${fmtAvr(subjAvr)}</div>
          <div class="stat-label">media</div>
        </div>
        <div class="stat">
          <div class="stat-value">${allGrades.length}</div>
          <div class="stat-label">voti</div>
        </div>
        ${highest != null ? `<div class="stat">
          <div class="stat-value ${gradeClass(highest)}">${fmtAvr(highest)}</div>
          <div class="stat-label">massimo</div>
        </div>` : ""}
        ${lowest != null ? `<div class="stat">
          <div class="stat-value ${gradeClass(lowest)}">${fmtAvr(lowest)}</div>
          <div class="stat-label">minimo</div>
        </div>` : ""}
      </div>
    </div>`;

  for (const p of periods) {
    if (!avr[p][subjName]) continue;
    const grades = avr[p][subjName].grades;

    html += `<div class="period-grades">
      <div class="period-label" style="padding-top:0">periodo ${p}</div>`;

    for (const g of grades) {
      const gc = g.isBlue ? "blue" : gradeClass(g.decimalValue);
      html += `
        <div class="grade-card" data-grade='${escAttr(JSON.stringify(g))}'>
          <div class="grade-big ${gc}">${g.displayValue || fmtAvr(g.decimalValue)}</div>
          <div class="grade-meta">
            <div class="grade-date">${g.evtDate || "—"}</div>
            ${g.componentDesc ? `<div class="grade-component">${escHtml(g.componentDesc)}</div>` : ""}
            ${g.notesForFamily ? `<div class="grade-note">${escHtml(g.notesForFamily)}</div>` : ""}
          </div>
          ${g.teacherName ? `<div style="font-size:11px;color:var(--muted);text-align:right;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(g.teacherName)}</div>` : ""}
        </div>`;
    }
    html += `</div>`;
  }
  
  html += `
    <div class="goal-section">
      <div class="goal-title">simulatore voto</div>
      <div class="goal-row">
        <span style="font-size:13px;color:var(--muted)">obiettivo</span>
        <input class="goal-input" id="goalTarget" type="number" min="1" max="10" step="0.25" placeholder="es. 7" />
        <span style="font-size:13px;color:var(--muted)">in</span>
        <input class="goal-input" id="goalNumGrades" type="number" min="1" max="10" step="1" value="1" style="width:54px" />
        <span style="font-size:13px;color:var(--muted)">voti</span>
        <button class="goal-btn" id="goalCalcBtn">calcola</button>
      </div>
      <div class="goal-result" id="goalResult"></div>
    </div>`;

  document.getElementById("subjectContent").innerHTML = html;

  document.querySelectorAll(".grade-card").forEach(card => {
    card.addEventListener("click", () => openGradeModal(JSON.parse(card.dataset.grade)));
  });

  document.getElementById("goalCalcBtn").addEventListener("click", () => {
    const target    = parseFloat(document.getElementById("goalTarget").value);
    const numGrades = parseInt(document.getElementById("goalNumGrades").value) || 1;
    if (isNaN(target) || target < 1 || target > 10) {
      document.getElementById("goalResult").textContent = "inserisci un obiettivo valido (1–10)";
      return;
    }
    const needed = calcGoalGrade(subjAvr, vals.length, target, numGrades);
    const res    = document.getElementById("goalResult");
    if (needed === null) {
      res.innerHTML = `media attuale già ≥ <strong>${target}</strong> 🎉`;
    } else if (needed > 10) {
      res.innerHTML = `non raggiungibile con ${numGrades} vot${numGrades === 1 ? "o" : "i"} (servirebbe <strong>${fmtAvr(needed)}</strong>)`;
    } else {
      res.innerHTML = `con ${numGrades} vot${numGrades === 1 ? "o" : "i"} da <strong>${fmtAvr(needed)}</strong> raggiungi <strong>${target}</strong>`;
    }
  });

  showView("view-subject");
}

function calcGoalGrade(currentAvr, currentCount, target, numGrades) {
  if (currentAvr >= target) return null;
  const needed = (target * (currentCount + numGrades) - currentAvr * currentCount) / numGrades;
  return needed;
}

function openGradeModal(g) {
  const gc = g.isBlue ? "blue" : gradeClass(g.decimalValue);
  document.getElementById("modalGrade").textContent = g.displayValue || fmtAvr(g.decimalValue);
  document.getElementById("modalGrade").className = `modal-grade-big ${gc}`;

  const rows = [
    ["data",       g.evtDate || "—"],
    g.componentDesc  ? ["componente", g.componentDesc]  : null,
    g.teacherName    ? ["docente",    g.teacherName]     : null,
    g.notesForFamily ? ["note",       g.notesForFamily]  : null,
    g.isBlue         ? ["tipo",       "voto blu (orale)"] : null,
  ].filter(Boolean);

  document.getElementById("modalRows").innerHTML = rows.map(([label, val]) =>
    `<div class="modal-row">
      <span class="modal-row-label">${label}</span>
      <span>${escHtml(String(val))}</span>
    </div>`
  ).join("");

  document.getElementById("gradeModal").classList.add("show");
}

function initTheme() {
  const saved  = localStorage.getItem("theme");
  const system = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
  const theme  = saved || system;
  applyTheme(theme);
}

function applyTheme(t) {
  document.documentElement.dataset.theme = t === "light" ? "light" : "";
  document.getElementById("themeIconSun").classList.toggle("hidden",  t === "light");
  document.getElementById("themeIconMoon").classList.toggle("hidden", t !== "light");
  localStorage.setItem("theme", t);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function escAttr(s) {
  return escHtml(s).replace(/'/g, "&#39;");
}

async function loadAndRender() {
  try {
    const grades     = await fetchGrades();
    state.gradesAvr  = calcAvr(grades);
    renderGrades(state.gradesAvr);
    showView("view-grades");
  } catch (err) {
    if (err.status === 401) {
      clearSession();
      showView("view-login");
    } else {
      document.getElementById("gradesContainer").innerHTML =
        `<div style="padding:20px;color:var(--red);font-size:13px">
          errore nel caricamento dei voti: ${escHtml(err.message)}
        </div>`;
    }
  }
}

document.addEventListener("DOMContentLoaded", () => {
  initTheme();

  document.getElementById("themeBtn").addEventListener("click", () => {
    const cur = document.documentElement.dataset.theme === "light" ? "light" : "dark";
    applyTheme(cur === "light" ? "dark" : "light");
  });

  document.getElementById("modalClose").addEventListener("click", () =>
    document.getElementById("gradeModal").classList.remove("show"));
  document.getElementById("gradeModal").addEventListener("click", e => {
    if (e.target === document.getElementById("gradeModal"))
      document.getElementById("gradeModal").classList.remove("show");
  });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") document.getElementById("gradeModal").classList.remove("show");
  });

  document.getElementById("backBtn").addEventListener("click", () => showView("view-grades"));

  document.getElementById("logoutBtn").addEventListener("click", () => {
    clearSession();
    showView("view-login");
  });

  document.getElementById("refreshBtn").addEventListener("click", async () => {
    const btn = document.getElementById("refreshBtn");
    btn.classList.add("spinning");
    btn.disabled = true;
    try {
      await loadAndRender();
    } finally {
      btn.classList.remove("spinning");
      btn.disabled = false;
    }
  });

  const loginBtn   = document.getElementById("loginBtn");
  const errorEl    = document.getElementById("loginError");
  const uidInput   = document.getElementById("inp-uid");
  const pwdInput   = document.getElementById("inp-pwd");

  async function doLogin() {
    const uid = uidInput.value.trim();
    const pwd = pwdInput.value;
    if (!uid || !pwd) { errorEl.textContent = "inserisci credenziali"; return; }

    loginBtn.disabled    = true;
    loginBtn.textContent = "accesso in corso...";
    errorEl.textContent  = "";

    try {
      await login(uid, pwd);
      await loadAndRender();
    } catch (err) {
      errorEl.textContent = err.message || "errore di login";
      loginBtn.disabled    = false;
      loginBtn.textContent = "Accedi";
    }
  }

  loginBtn.addEventListener("click", doLogin);
  pwdInput.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  uidInput.addEventListener("keydown", e => { if (e.key === "Enter") pwdInput.focus(); });

  if (loadSession()) {
    showView("view-grades");
    loadAndRender();
  }

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  }
});
</script>
</body>
</html>
